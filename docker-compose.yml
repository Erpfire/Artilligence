services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: artilligence
      POSTGRES_PASSWORD: artilligence_dev
      POSTGRES_DB: artilligence
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      target: dev
    restart: unless-stopped
    ports:
      - "3005:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://artilligence:artilligence_dev@db:5432/artilligence
      NEXTAUTH_SECRET: dev-secret-change-in-production
      NEXTAUTH_URL: http://localhost:3005
    depends_on:
      - db

volumes:
  pgdata:
  uploads:
